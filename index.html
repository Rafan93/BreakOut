<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BreakOut 23-24</title>

    <link rel="stylesheet" href="css/estils.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!--MENÚ PRINCIPAL-->
    <div id="menu-principal" class="d-flex justify-content-center align-items-center vh-100 bg-dark bg-opacity-75">
        <div class="card p-4 shadow-lg" style="width: 380px; background:#222; color:white;">

            <h2 class="text-center mb-3">BreakOut DEMO</h2>

            <label class="form-label">Introdueix el teu nom:</label>
            <input type="text" id="nomJugador" class="form-control mb-3" placeholder="Nom d’usuari">

            <label class="form-label">Selecciona el nivell:</label>
            <div class="d-flex justify-content-between mb-3">
                <button class="btn btn-primary nivell-btn w-100 mx-1" data-nivell="1">NIVELL 1</button>
                <button class="btn btn-success nivell-btn w-100 mx-1" data-nivell="2">NIVELL 2</button>
                <button class="btn btn-danger nivell-btn w-100 mx-1" data-nivell="3">NIVELL 3</button>
            </div>

            <button id="jugarBtn" class="btn btn-info w-100 fw-bold mb-3">JUGAR</button>

            <hr style="border-color:#555;">
            <h6 class="text-center mb-2" style="color:#FFD700;">TOP 5</h6>
            <div id="ranking-menu" class="text-center small"></div>

        </div>
    </div>

    <!--JUEGO CANVAS-->
    <div id="principal">
        <canvas id="joc" width="740" height="400"></canvas>
    </div>

    <!--PANTALLA VICTÒRIA-->
    <div id="pantalla-win" class="d-none justify-content-center align-items-center" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:rgba(0,0,0,0.85);">
        <div class="card p-4 shadow-lg text-center" style="width:420px;background:#1a1a2e;color:white;border:2px solid #FFD700;">
            <h1 class="mb-1" style="color:#FFD700;font-size:2.5rem;">ENHORABONA!</h1>
            <p class="mb-3" style="color:#aaa;">Has completat tots els nivells!</p>
            <div class="mb-3 p-3 rounded" style="background:#0f3460;">
                <span style="color:#aaa;font-size:0.9rem;">PUNTUACIÓ FINAL</span>
                <div id="win-punts" style="color:#4CF;font-size:2rem;font-weight:bold;">0</div>
            </div>
            <hr style="border-color:#444;">
            <h6 class="mb-2" style="color:#FFD700;">TOP 5</h6>
            <div id="win-ranking" class="text-start small mb-3"></div>
            <button id="win-tornarBtn" class="btn btn-warning fw-bold w-100">TORNAR AL MENÚ</button>
        </div>
    </div>

    <!--PANTALLA DERROTA-->
    <div id="pantalla-lose" class="d-none justify-content-center align-items-center" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:rgba(0,0,0,0.85);">
        <div class="card p-4 shadow-lg text-center" style="width:420px;background:#1a1a2e;color:white;border:2px solid #e74c3c;">
            <h1 class="mb-1" style="color:#e74c3c;font-size:2.5rem;">ELIMINAT!</h1>
            <p class="mb-3" style="color:#aaa;">Has perdut totes les vides!</p>
            <div class="mb-3 p-3 rounded" style="background:#0f3460;">
                <span style="color:#aaa;font-size:0.9rem;">PUNTUACIÓ FINAL</span>
                <div id="lose-punts" style="color:#4CF;font-size:2rem;font-weight:bold;">0</div>
            </div>
            <hr style="border-color:#444;">
            <h6 class="mb-2" style="color:#FFD700;">TOP 5</h6>
            <div id="lose-ranking" class="text-start small mb-3"></div>
            <button id="lose-tornarBtn" class="btn btn-danger fw-bold w-100">TORNAR AL MENÚ</button>
        </div>
    </div>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/jquery-3.6.0.min.js"></script>
<script src="js/jquery-ui.min.js"></script>

<script src="js/joc.js"></script>
<script src="js/bola.js"></script>
<script src="js/punt.js"></script>
<script src="js/pala.js"></script>
<script src="js/totxo.js"></script>
<script src="js/mur.js"></script>
<script src="js/segment.js"></script>

<script src="js/app.js"></script>

</html>
